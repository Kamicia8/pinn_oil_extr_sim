program: Vanilla PINN Hyperparameter Sweep
method: grid

metric:
  name: total_loss
  goal: minimize

parameters:
  set:
    values:

    - {optimizer: 'lbfgs', max_iter: 20, learning_rate: 0.01, layers: 4, neurons_per_layer: 8, num_epochs: 100, activation_function: 'tanh', N_POINTS_T: 20,
      interior_points: 10000, boundary_points: 10000, initial_points: 10000,
      weight_residual: 1.0, weight_initial: 1.0, weight_boundary: 1.0}
