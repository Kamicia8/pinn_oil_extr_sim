program: pinn_kq_grid_morepoints.py
method: bayes

metric:
  name: total_loss
  goal: minimize

parameters:
  learning_rate:
    values: [0.001]
  layers:
    values: [8, 16]
  neurons_per_layer:
    values: [20]
  num_epochs:
    values: [1000]
  activation_function:
    values: ['tanh']
  N_POINTS_T:
    values: [10]
  interior_points:
    values: [1000]
  boundary_points:
    values: [1000]
  initial_points:
    values: [1000]
  weight_residual:
    values: [1.0]
  weight_initial:
    values: [1.0]
  weight_boundary:
    values: [1.0]